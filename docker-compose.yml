version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  # Add local database if not using Supabase cloud
  # db:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_PASSWORD: password
